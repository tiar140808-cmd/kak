<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dina Love Book</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
background:#0b0b0f;
overflow:hidden;
}

/* ================= LOADING ================= */
#loading{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
z-index:999;
}

#loading img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:2px solid #ff4fd8;
box-shadow:0 0 20px #ff4fd8;
}

#loading p{
color:#ff77dd;
margin-top:15px;
}

/* ================= BOOK ================= */
#book{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:280px;
height:380px;
perspective:1200px;
}

.page{
position:absolute;
width:100%;
height:100%;
background:white;
border-radius:12px;
overflow:hidden;
transition:0.6s;
box-shadow:0 10px 25px rgba(0,0,0,.4);
}

.page img{
width:100%;
height:100%;
object-fit:cover;
}

.hide{
transform:rotateY(-120deg);
opacity:0;
}

/* ================= LOVE ================= */
#love{
position:fixed;
inset:0;
display:none;
}

#loveBox{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:420px;
height:420px;
}

/* small photos */
.photo{
position:absolute;
width:18px;
height:18px;
border-radius:50%;
object-fit:cover;
border:1px solid white;
box-shadow:0 0 8px #ff4fd8;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
<img src="profil.jpg">
<p>Loading surat spesial...</p>
</div>

<!-- BOOK -->
<div id="book">

<div class="page" id="p0"><img src="cover_depan.jpg"></div>
<div class="page" id="p1"><img src="foto.jpg"></div>
<div class="page" id="p2"><img src="foto2.jpg"></div>
<div class="page" id="p3"><img src="foto3.jpg"></div>
<div class="page" id="p4"><img src="cover_belakang.jpg"></div>

</div>

<!-- LOVE -->
<div id="love">
<div id="loveBox"></div>
</div>

<script>

/* ================= LOADING ================= */
setTimeout(()=>{
document.getElementById("loading").style.display="none";
},2000);

/* ================= BOOK SWIPE ================= */
const pages=[
document.getElementById("p0"),
document.getElementById("p1"),
document.getElementById("p2"),
document.getElementById("p3"),
document.getElementById("p4")
];

let i=0;
let startX=0;

function next(){
if(i < pages.length){
pages[i].classList.add("hide");
i++;
}

if(i >= pages.length){
setTimeout(showLove,500);
}
}

document.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

document.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;
if(startX-endX > 50){
next();
}
});

document.addEventListener("mousedown",e=>{
startX=e.clientX;
});

document.addEventListener("mouseup",e=>{
let endX=e.clientX;
if(startX-endX > 50){
next();
}
});

/* ================= LOVE MESH ================= */
function showLove(){

document.getElementById("book").style.display="none";
document.getElementById("love").style.display="block";

const box=document.getElementById("loveBox");

const photos=["foto.jpg","foto2.jpg","foto3.jpg"];

/* LOVE SHAPE POINTS */
let points=[];

for(let t=0;t<Math.PI*2;t+=0.08){
let x=16*Math.pow(Math.sin(t),3);
let y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));
points.push({x:x*10,y:y*10});
}

/* CREATE PHOTOS */
points.forEach((p,i)=>{
let img=document.createElement("img");
img.src=photos[i%3];
img.className="photo";

img.style.left="50%";
img.style.top="50%";

box.appendChild(img);

setTimeout(()=>{
img.style.left=200+p.x+"px";
img.style.top=200+p.y+"px";
},100);
});

/* ROTATE + ZOOM CONTROL */
let rot=0;
let zoom=1;
let down=false;
let lx=0,ly=0;

box.addEventListener("mousedown",e=>{
down=true;
lx=e.clientX;
ly=e.clientY;
});

document.addEventListener("mouseup",()=>down=false);

document.addEventListener("mousemove",e=>{
if(!down) return;

rot+=(e.clientX-lx)*0.01;
lx=e.clientX;
ly=e.clientY;

box.style.transform=`translate(-50%,-50%) rotate(${rot}rad) scale(${zoom})`;
});

box.addEventListener("wheel",e=>{
zoom+=e.deltaY*-0.001;
zoom=Math.min(Math.max(0.3,zoom),2.5);

box.style.transform=`translate(-50%,-50%) rotate(${rot}rad) scale(${zoom})`;
});

}

</script>

</body>
</html>
