<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Graduation Dina</title>
<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  padding:0;
  font-family: 'Dancing Script', cursive;
  background:#0b0b12;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  height:100vh;
  overflow:hidden;
  color:white;
  text-align:center;
}

#imageContainer {
  position:relative;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#imageContainer img {
  max-width:90%;
  max-height:70vh;
  border-radius:20px;
  box-shadow:0 0 40px rgba(255,0,150,0.3);
  animation: float 4s ease-in-out infinite;
}

/* Floating effect for image */
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

#animatedText {
  margin-top:20px;
  font-size:2.5rem;
  color:#ff9ae6;
  min-height:3rem;
  font-weight:bold;
}

/* Description */
#description {
  margin-top:10px;
  font-size:1.8rem;
  color:#ff77dd;
}

/* Responsif */
@media (max-width:600px){
  #animatedText {
    font-size:2rem;
  }
  #description {
    font-size:1.3rem;
  }
  #imageContainer img {
    max-height:50vh;
  }
}
</style>
</head>
<body>

<div id="imageContainer">
  <img src="galaxy.jpg" alt="Galaxy">
  <div id="animatedText"></div>
  <div id="description">dibuat dengan cintaahh ❤️</div>
</div>

<script>
// Teks animasi muncul satu per satu
const texts = [
  "Happy Graduation Dinaaaa🌸",
  "perjalananmu penuh warna dan cerita indah.",
  "bangga dengan semua pencapaianmu!",
  "semoga masa depanmu cerah seperti bintang-bintang. ✨",
  "-DINAAAAPESEEEKKKKK💋"
];

const animatedText = document.getElementById('animatedText');
let textIndex = 0;
let charIndex = 0;

function typeNextChar(){
  if(textIndex >= texts.length) return;
  const currentText = texts[textIndex];
  if(charIndex < currentText.length){
    animatedText.textContent += currentText.charAt(charIndex);
    charIndex++;
    setTimeout(typeNextChar, 70); // kecepatan mengetik
  } else {
    // setelah selesai satu teks, tunggu sebentar lalu lanjut ke teks berikutnya
    setTimeout(()=>{
      animatedText.textContent = "";
      charIndex = 0;
      textIndex++;
      typeNextChar();
    }, 2000);
  }
}

// mulai animasi
typeNextChar();
</script>

</body>
</html>
