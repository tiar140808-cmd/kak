<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dina Graduation</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
background:black;
overflow:hidden;
}

/* ================= LOADING ================= */
#loading{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
z-index:999;
}

#loading img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:2px solid #ff4fd8;
box-shadow:0 0 20px #ff4fd8;
}

#loading h2{
margin-top:15px;
color:#ff77dd;
text-align:center;
}

/* ================= BOOK (KAYA BUKU ASLI) ================= */
#book{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:260px;
height:360px;
border-radius:16px;
overflow:hidden;
box-shadow:0 0 25px rgba(255,255,255,0.25);
background:#111;
}

.card{
position:absolute;
width:100%;
height:100%;
transition:0.6s ease;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

.hide{
transform:translateX(-120%) rotate(-8deg);
opacity:0;
}

/* ================= LOVE ================= */
#love{
position:fixed;
inset:0;
display:none;
background:radial-gradient(circle,#000,#111,#000);
overflow:hidden;
}

.photo{
position:absolute;
width:60px;
height:60px;
border-radius:50%;
border:2px solid white;
box-shadow:0 0 15px #ff4fd8;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
<img src="profil.jpg">
<h2>HAPPY GRADUATION DINA</h2>
</div>

<!-- BOOK -->
<div id="book">
<div class="card" id="c1"><img src="foto.jpg"></div>
<div class="card" id="c2"><img src="foto2.jpg"></div>
<div class="card" id="c3"><img src="foto3.jpg"></div>
</div>

<!-- LOVE -->
<div id="love"></div>

<script>

/* ================= LOADING ================= */
setTimeout(()=>{
document.getElementById("loading").style.display="none";
},2500);

/* ================= BOOK SWIPE ================= */
const cards=[
document.getElementById("c1"),
document.getElementById("c2"),
document.getElementById("c3")
];

let index=0;
let startX=0;
let down=false;

document.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
down=true;
});

document.addEventListener("touchend",e=>{
if(!down) return;
down=false;

let endX=e.changedTouches[0].clientX;

if(startX-endX>50){
next();
}
});

document.addEventListener("mousedown",e=>{
startX=e.clientX;
down=true;
});

document.addEventListener("mouseup",e=>{
if(!down) return;
down=false;

let endX=e.clientX;

if(startX-endX>50){
next();
}
});

function next(){
if(index < cards.length){
cards[index].classList.add("hide");
index++;
}

if(index >= cards.length){
showLove();
}
}

/* ================= LOVE GALAXY ================= */
function showLove(){

document.getElementById("book").style.display="none";

const love=document.getElementById("love");
love.style.display="block";

const photos=["foto.jpg","foto2.jpg","foto3.jpg"];

let cx=window.innerWidth/2;
let cy=window.innerHeight/2;

let rotX=0, rotY=0, zoom=1;
let down=false, lastX=0, lastY=0;

let points=[];

/* galaxy spiral */
for(let i=0;i<220;i++){
let a=i*0.25;
let r=i*3;

points.push({
x:Math.cos(a)*r,
y:Math.sin(a)*r,
z:i*2
});
}

points.forEach((p,i)=>{
const img=document.createElement("img");
img.src=photos[i%3];
img.className="photo";
love.appendChild(img);
p.el=img;
});

/* drag rotate */
love.addEventListener("mousedown",e=>{
down=true;
lastX=e.clientX;
lastY=e.clientY;
});

love.addEventListener("mouseup",()=>down=false);

love.addEventListener("mousemove",e=>{
if(!down) return;

rotY+=(e.clientX-lastX)*0.01;
rotX+=(e.clientY-lastY)*0.01;

lastX=e.clientX;
lastY=e.clientY;
});

/* zoom */
love.addEventListener("wheel",e=>{
zoom+=e.deltaY*-0.001;
zoom=Math.max(0.3,Math.min(3,zoom));
});

/* render */
function animate(){

points.forEach(p=>{

let y=p.y*Math.cos(rotX)-p.z*Math.sin(rotX);
let z=p.y*Math.sin(rotX)+p.z*Math.cos(rotX);

let x=p.x*Math.cos(rotY)+z*Math.sin(rotY);
z=p.x*-Math.sin(rotY)+z*Math.cos(rotY);

let depth=1/(z+500);

p.el.style.transform=
`translate(${cx+x*depth*zoom}px,${cy+y*depth*zoom}px)
scale(${depth*3*zoom})`;

});

requestAnimationFrame(animate);
}

animate();

}

</script>

</body>
</html>
