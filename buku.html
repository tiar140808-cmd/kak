<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buku & Love</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#111;color:white;font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;}

  /* LOADING */
  #loading{
    position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#111;z-index:10;
  }
  #loading img{width:120px;height:120px;border-radius:50%;margin-bottom:20px;animation:fade 1.5s infinite;}
  @keyframes fade{0%,100%{opacity:0.2;}50%{opacity:1;}}

  /* BUKU */
  #bookContainer{
    width:360px;height:480px;position:relative;z-index:5;display:none;
  }
  .page{
    width:100%;height:100%;background:white;border-radius:15px;box-shadow:0 10px 25px rgba(0,0,0,0.5);
    display:flex;justify-content:center;align-items:center;overflow:hidden;position:absolute;top:0;left:0;transition:transform 0.5s ease;
  }
  .page img{width:90%;border-radius:10px;object-fit:cover;}

  #prev,#next{
    position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.6);border:none;color:white;font-size:24px;padding:10px 15px;border-radius:8px;cursor:pointer;
  }
  #prev{left:-60px;}
  #next{right:-60px;}

  /* LOVE FORMATION */
  #loveScene{position:absolute;inset:0;display:none;justify-content:center;align-items:center;}
  .lovePhoto{
    position:absolute;width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid white;cursor:grab;
    opacity:0; transform: scale(0);
    transition: all 0.5s ease;
  }
</style>
</head>
<body>

<div id="loading">
  <img src="profil.jpg" alt="Loading Profil">
  <div>Loading...</div>
</div>

<div id="bookContainer">
  <div class="page" id="coverFront">Cover Depan</div>
  <div class="page"><img src="foto.jpg"></div>
  <div class="page"><img src="foto2.jpg"></div>
  <div class="page"><img src="foto3.jpg"></div>
  <div class="page" id="coverBack">Cover Belakang</div>
  <button id="prev">&#8592;</button>
  <button id="next">&#8594;</button>
</div>

<div id="loveScene"></div>

<script>
  // ================= LOADING =================
  window.addEventListener('load',()=>{
    setTimeout(()=>{
      document.getElementById('loading').style.display='none';
      document.getElementById('bookContainer').style.display='block';
    },1500);
  });

  // ================= BUKU =================
  const pages = Array.from(document.querySelectorAll('#bookContainer .page'));
  let current = 0;
  pages.forEach((p,i)=>{p.style.transform=`translateX(${i*100}%)`});

  const prevBtn = document.getElementById('prev');
  const nextBtn = document.getElementById('next');

  function updatePages(){
    pages.forEach((p,i)=>{p.style.transform=`translateX(${(i-current)*100}%)`});
    if(current === pages.length -1){
      setTimeout(startLove,500);
    }
  }

  prevBtn.addEventListener('click',()=>{if(current>0){current--;updatePages();}});
  nextBtn.addEventListener('click',()=>{if(current<pages.length-1){current++;updatePages();}});

  let startX=0;
  const bookContainer = document.getElementById('bookContainer');
  bookContainer.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;});
  bookContainer.addEventListener('touchend',e=>{
    let endX=e.changedTouches[0].clientX;
    if(startX-endX>50 && current<pages.length-1){current++;updatePages();}
    else if(endX-startX>50 && current>0){current--;updatePages();}
  });

  // ================= LOVE FORMATION =================
  const loveScene = document.getElementById('loveScene');
  const lovePhotos = ['foto.jpg','foto2.jpg','foto3.jpg'];
  let loveElements=[];

  function startLove(){
    document.getElementById('bookContainer').style.display='none';
    loveScene.style.display='flex';

    const width = window.innerWidth;
    const height = window.innerHeight;
    const scale = 15;
    let points=[];
    for(let t=0;t<Math.PI*2;t+=0.15){
      let x = 16*Math.pow(Math.sin(t),3);
      let y = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));
      points.push({x:width/2+x*scale,y:height/2+y*scale});
    }

    points.forEach((p,i)=>{
      setTimeout(()=>{
        const img = document.createElement('img');
        img.src = lovePhotos[i%lovePhotos.length];
        img.className='lovePhoto';
        img.style.left = width/2 + 'px';
        img.style.top = height/2 + 'px';
        loveScene.appendChild(img);
        loveElements.push(img);

        // efek muncul satu per satu
        setTimeout(()=>{
          img.style.left = p.x + 'px';
          img.style.top = p.y + 'px';
          img.style.opacity = 1;
          img.style.transform = 'scale(1)';
        },50);
      }, i*80); // delay per foto
    });
  }

  // ================= DRAG & ZOOM =================
  let isDragging=false, startDrag={x:0,y:0}, currentImg=null;

  function startDragFunc(e){
    if(e.target.classList.contains('lovePhoto')){
      isDragging=true;
      currentImg=e.target;
      startDrag={x:(e.clientX||e.touches[0].clientX) - currentImg.offsetLeft, y:(e.clientY||e.touches[0].clientY) - currentImg.offsetTop};
    }
  }
  function moveDragFunc(e){
    if(isDragging && currentImg){
      const cx = e.clientX || e.touches[0].clientX;
      const cy = e.clientY || e.touches[0].clientY;
      currentImg.style.left = (cx - startDrag.x) + 'px';
      currentImg.style.top = (cy - startDrag.y) + 'px';
    }
  }
  function endDragFunc(){isDragging=false; currentImg=null;}

  loveScene.addEventListener('mousedown', startDragFunc);
  loveScene.addEventListener('mousemove', moveDragFunc);
  loveScene.addEventListener('mouseup', endDragFunc);
  loveScene.addEventListener('mouseleave', endDragFunc);

  loveScene.addEventListener('touchstart', startDragFunc);
  loveScene.addEventListener('touchmove', moveDragFunc);
  loveScene.addEventListener('touchend', endDragFunc);

  loveScene.addEventListener('wheel', e=>{
    e.preventDefault();
    loveElements.forEach(img=>{
      let transform = img.style.transform || '';
      let m = transform.match(/scale\(([\d\.]+)\)/);
      let s = m ? parseFloat(m[1]) : 1;
      s += e.deltaY * -0.001;
      if(s<0.2)s=0.2;if(s>3)s=3;
      img.style.transform = `scale(${s})`;
    });
  });
</script>
</body>
</html>
