<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dina Love Book FIX</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#0b0b12;
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:sans-serif;
}

/* LOADING */
#loading{
  position:fixed;inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:#0b0b12;
  z-index:999;
}
#loading img{
  width:120px;height:120px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #ff4fd8;
}

/* BOOK */
#book{
  width:300px;
  height:400px;
  perspective:1200px;
  position:relative;
}

.page, .cover{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:10px;
  overflow:hidden;
  transition:1s;
  transform-origin:left;
  box-shadow:0 10px 25px rgba(0,0,0,.4);
}

.page img, .cover img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.flip{
  transform:rotateY(-160deg);
}

/* LOVE */
#love{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
}

#loveBox{
  width:650px;
  height:650px;
  position:relative;
  transform-style:preserve-3d;
}

.loveImg{
  width:45px;
  height:45px;
  position:absolute;
  object-fit:cover;
  border-radius:0;
  opacity:0;
  transform:scale(0);
  transition:0.8s ease;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
  <img src="profil.jpg">
</div>

<!-- BOOK -->
<div id="book">

  <div class="cover" id="c1"><img src="cover.jpg"></div>
  <div class="page" id="p1"><img src="foto.jpg"></div>
  <div class="page" id="p2"><img src="foto2.jpg"></div>
  <div class="page" id="p3"><img src="foto3.jpg"></div>
  <div class="cover" id="c2"><img src="cover.jpg"></div>

</div>

<!-- LOVE -->
<div id="love">
  <div id="loveBox"></div>
</div>

<script>

/* LOADING */
setTimeout(()=>{
  document.getElementById("loading").style.display="none";
},1500);

/* BOOK FLOW FIX */
let pages=[
  document.getElementById("p1"),
  document.getElementById("p2"),
  document.getElementById("p3")
];

let i=0;

document.addEventListener("click",()=>{
  if(i < pages.length){
    pages[i].classList.add("flip");
    i++;
  }
  else if(i === pages.length){
    i++;
    startLove();
  }
});

/* LOVE FIX */
function startLove(){

  document.getElementById("book").style.display="none";
  document.getElementById("love").style.display="flex";

  const box=document.getElementById("loveBox");
  const imgs=["foto.jpg","foto2.jpg","foto3.jpg"];

  let points=[];

  // PADAT LOVE (NO BOLONG TENGAH)
  for(let t=0;t<Math.PI*2;t+=0.08){
    let x=16*Math.pow(Math.sin(t),3);
    let y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

    // isi tengah biar ga bolong
    for(let k=0;k<3;k++){
      points.push({
        x:x*15 + (Math.random()-0.5)*10,
        y:y*15 + (Math.random()-0.5)*10
      });
    }
  }

  let used=0;

  points.forEach((p,idx)=>{

    setTimeout(()=>{

      // STOP kalau sudah cukup (ANTI BUG NGELEBIHIN)
      if(used > 120) return;

      let img=document.createElement("img");
      img.src=imgs[used%3];
      img.className="loveImg";

      box.appendChild(img);

      img.style.left="50%";
      img.style.top="50%";

      setTimeout(()=>{
        img.style.opacity=1;
        img.style.transform="scale(1)";
        img.style.left=300+p.x+"px";
        img.style.top=300+p.y+"px";
      },50);

      used++;

    }, idx*40); // pelan & smooth

  });

}

</script>
</body>
</html>
