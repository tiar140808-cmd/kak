<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> memory</title>

<style>
body{
  margin:0;
  font-family:monospace;
  background:#050510;
  color:#00ffe7;
  overflow-x:hidden;
}

/* RAIN CANVAS */
#matrix{
  position:fixed;
  inset:0;
  z-index:-5;
  opacity:0.3; 
}

/* --- ANIMASI KARTUN CSS (Cyber-Bot) --- */
.footer-animation {
  width: 100%;
  height: 120px;
  position: relative;
  margin-top: 50px;
  border-top: 1px dashed rgba(0, 255, 231, 0.2);
}

.bot {
  position: absolute;
  bottom: 20px;
  width: 50px;
  height: 50px;
  animation: walkBot 15s linear infinite;
}

/* Badan Bot */
.bot-body {
  width: 40px;
  height: 35px;
  background: #00ffe7;
  border-radius: 8px;
  position: relative;
  box-shadow: 0 0 15px #00ffe7;
}

/* Mata berkedip */
.bot-body::before, .bot-body::after {
  content: '';
  position: absolute;
  top: 10px;
  width: 6px;
  height: 6px;
  background: #050510;
  border-radius: 50%;
  animation: blink 3s infinite;
}
.bot-body::before { left: 8px; }
.bot-body::after { right: 8px; }

/* Kaki bergerak */
.bot-legs {
  display: flex;
  justify-content: space-around;
  margin-top: 2px;
  width: 40px;
}
.leg {
  width: 8px;
  height: 12px;
  background: #00ffe7;
  border-radius: 2px;
}
.leg.left { animation: legSwing 0.5s infinite alternate; }
.leg.right { animation: legSwing 0.5s infinite alternate-reverse; }

@keyframes walkBot {
  0% { left: -60px; transform: scaleX(1); }
  49% { transform: scaleX(1); }
  50% { left: calc(100% + 60px); transform: scaleX(-1); }
  100% { left: -60px; transform: scaleX(-1); }
}

@keyframes blink {
  0%, 90%, 100% { height: 6px; }
  95% { height: 1px; }
}

@keyframes legSwing {
  from { transform: translateY(0); }
  to { transform: translateY(-5px); }
}
/* --- END ANIMASI KARTUN --- */

/* GATE */
#gate{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:black;
  z-index:9999;
  text-align:center;
  transition:1s;
}

.profile{
  width:140px;
  height:140px;
  border-radius:50%;
  background:url("profil.jpg") center/cover;
  border:2px solid #00ffe7;
  box-shadow:0 0 20px #00ffe7;
  animation:fadeIn 1.5s ease;
}

.enter{
  margin-top:20px;
  padding:10px 18px;
  border:1px solid #00ffe7;
  background:transparent;
  color:#00ffe7;
  cursor:pointer;
  transition:0.3s;
}
.enter:hover{
  background:#00ffe7;
  color:black;
}

/* MAIN */
main{
  display:none;
}

/* SCENE */
.scene{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px;
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}

.scene.show{
  opacity:1;
  transform:translateY(0);
}

.scene img{
  width:min(320px,90vw);
  border-radius:15px;
  border:1px solid #00ffe7;
  margin-bottom:20px;
  box-shadow:0 0 20px rgba(0,255,231,0.2);
}

.typing{
  max-width:700px;
  line-height:1.8;
  font-size:14px;
  white-space:pre-wrap;
  min-height:40px;
}

@keyframes fadeIn{
  from{opacity:0; transform:scale(0.8);}
  to{opacity:1; transform:scale(1);}
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- GATE -->
<div id="gate">
  <div class="profile"></div>
  <h2> GRADUATION </h2>
  <button class="enter" onclick="enter()">unlock memory</button>
</div>

<main>

<!-- FRAME 1 -->
<div class="scene">
  <h1>happy graduation 🎓</h1>
  <div class="typing" data-text="Dina Nur Aini...
jangan nangis ya.
aku tau ini harusnya jadi hari paling bahagia buat kamu, tapi aku juga tau kadang bahagia ga selalu sesederhana itu.
aku sedih... karena aku ga bisa liat langsung hari wisudamu, ga bisa ada di sana, ga bisa nemenin kamu di momen yang harusnya penting banget itu.
aku bahkan ga bisa ngasih kamu hadiah, ga bisa kasih sesuatu yang bisa kamu pegang.
dan jujur... aku juga malu sama diriku sendiri.
tapi walaupun aku ga ada di sana... aku tetap bangga sama kamu, bener-bener bangga."></div>
</div>

<!-- FRAME 2 -->
<div class="scene">
  <div class="typing" data-text="aku cuma mau kamu tau, aku bangga sama kamu. bangga banget sampai kadang aku sendiri bingung gimana cara jelasin perasaan itu.
aku liat kamu sampai di titik ini dan aku tau itu bukan perjalanan yang gampang. ada capek, ada jatuh, ada hari dimana kamu mungkin pengen nyerah, tapi kamu tetap jalan.
dan itu yang bikin aku kagum sama kamu.

</div>

<!-- FRAME 3 -->
<div class="scene">
  <div class="typing" data-text="maaf ya...

<!-- FOTO -->
<div class="scene">

  <div class="typing" data-text="walaupun cuma kayak gini... perasaan aku ke kamu itu beneran,
    kamu akan selalu punya aku, oke? Aku mungkin bukan apa-apa, tapi aku akan selalu berada di sisimu apa pun yang terjadi."></div>

</div>

<!-- ENDING SAD -->
<div class="scene">
  <div class="typing" data-text="kalau suatu hari nanti kamu ngerasa capek, ngerasa sendiri, atau dunia terasa terlalu berat buat kamu jalanin...
aku harap kamu inget ini.

tapi perasaan aku ke kamu itu ga pernah sebentar.
dan kalau suatu hari kamu lupa seberapa berharganya kamu...

karena pernah ada seseorang yang benar-benar tulus sayang sama kamu, tanpa minta apa pun sebagai balasan.
itu aku."></div>

  <!-- KARTUN CSS DI PALING BAWAH -->
  <div class="footer-animation">
    <div class="bot">
      <div class="bot-body"></div>
      <div class="bot-legs">
        <div class="leg left"></div>
        <div class="leg right"></div>
      </div>
    </div>
  </div>
</div>

</main>

<script>
function enter(){
  const gate = document.getElementById("gate");
  gate.style.opacity = "0";
  setTimeout(()=>{
    gate.style.display="none";
    document.querySelector("main").style.display="block";
    observeScenes();
  },800);
}

function observeScenes(){
  const scenes=document.querySelectorAll(".scene");
  const observer=new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.classList.add("show");
        typeText(entry.target.querySelector(".typing"));
      }
    });
  },{threshold:0.4});
  scenes.forEach(s=>observer.observe(s));
}

function typeText(el){
  if(!el || el.classList.contains("done")) return;
  let text=el.dataset.text;
  el.textContent="";
  el.classList.add("done");
  let i=0;
  function typing(){
    if(i<text.length){
      el.textContent+=text[i];
      i++;
      setTimeout(typing,30);
    }
  }
  typing();
}

/* EFEK HUJAN */
const c = document.getElementById("matrix");
const ctx = c.getContext("2d");
c.width = window.innerWidth;
c.height = window.innerHeight;
let raindrops = [];

function createRain() {
  raindrops = [];
  for (let i = 0; i < 150; i++) {
    raindrops.push({
      x: Math.random() * c.width,
      y: Math.random() * c.height,
      length: Math.random() * 20 + 10,
      speed: Math.random() * 5 + 3
    });
  }
}

function drawRain() {
  ctx.clearRect(0, 0, c.width, c.height);
  ctx.strokeStyle = "rgba(0, 255, 231, 0.4)"; 
  ctx.lineWidth = 1;
  ctx.lineCap = "round";
  raindrops.forEach(r => {
    ctx.beginPath(); ctx.moveTo(r.x, r.y); ctx.lineTo(r.x, r.y + r.length); ctx.stroke();
    r.y += r.speed;
    if (r.y > c.height) { r.y = -r.length; r.x = Math.random() * c.width; }
  });
  requestAnimationFrame(drawRain);
}

window.addEventListener("resize", () => {
  c.width = window.innerWidth; c.height = window.innerHeight;
  createRain();
});

createRain();
drawRain();
</script>

</body>
</html>
