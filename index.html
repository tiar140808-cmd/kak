<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>memory</title>

<style>
body{
  margin:0;
  font-family:monospace;
  background:#050510;
  color:#00ffe7;
  overflow-x:hidden;
}

#matrix{
  position:fixed;
  inset:0;
  z-index:-5;
  opacity:0.3;
}

/* GATE */
#gate{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:black;
  z-index:9999;
  transition:1s;
}

#gate.hide{
  opacity:0;
  transform:scale(1.2);
  filter:blur(10px);
}

.profile{
  width:140px;
  height:140px;
  border-radius:50%;
  background:url("profil.jpg") center/cover;
  border:2px solid #00ffe7;
  box-shadow:0 0 20px #00ffe7;
}

.enter{
  margin-top:20px;
  padding:10px 18px;
  border:1px solid #00ffe7;
  background:transparent;
  color:#00ffe7;
  cursor:pointer;
}

main{display:none;}

/* SCENE (JANGAN DIUBAH) */
.scene{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px;
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}

.scene.show{opacity:1;transform:translateY(0);}

.scene img{
  width:min(320px,90vw);
  border-radius:15px;
  border:1px solid #00ffe7;
  margin-bottom:20px;
}

.typing{
  max-width:700px;
  line-height:1.8;
  white-space:pre-wrap;
}

/* ================= BARCODE CYBER FIX ================= */
.barcode{
  margin:50px auto;
  width:min(340px,85vw);
  display:flex;
  justify-content:center;
}

.barcode img{
  width:100%;
  border-radius:14px;

  /* cyber frame */
  padding:12px;
  background:rgba(0,0,0,0.6);
  border:1px solid #00ffe7;

  /* glow + shadow */
  box-shadow:
    0 0 15px rgba(0,255,231,0.5),
    0 0 40px rgba(0,255,231,0.2),
    inset 0 0 10px rgba(0,255,231,0.15);
}

/* MATRIX */
canvas{
  position:fixed;
  inset:0;
  z-index:-10;
}
</style>
</head>

<script>

function enter(){
  document.getElementById("gate").classList.add("hide");
  setTimeout(()=>{
    document.getElementById("gate").style.display="none";
    document.querySelector("main").style.display="block";
    observe();
  },900);
}

/* SCENE */
function observe(){
  document.querySelectorAll(".scene").forEach(s=>{
    new IntersectionObserver(e=>{
      if(e[0].isIntersecting){
        s.classList.add("show");
        type(s.querySelector(".typing"));
      }
    }).observe(s);
  });
}

function type(el){
  if(!el || el.classList.contains("done")) return;
  let t = el.dataset.text, i = 0;
  el.textContent = "";
  el.classList.add("done");

  (function run(){
    if(i < t.length){
      el.textContent += t[i++];
      setTimeout(run, 25);
    }
  })();
}

/* MATRIX */
const c=document.getElementById("matrix");
const x=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let r=[];
for(let i=0;i<120;i++){
  r.push({x:Math.random()*c.width,y:Math.random()*c.height,s:3+Math.random()*5});
}

(function draw(){
  x.clearRect(0,0,c.width,c.height);
  x.strokeStyle="rgba(0,255,231,.4)";
  r.forEach(v=>{
    x.beginPath();
    x.moveTo(v.x,v.y);
    x.lineTo(v.x,v.y+10);
    x.stroke();
    v.y+=v.s;
    if(v.y>c.height)v.y=0;
  });
  requestAnimationFrame(draw);
})();

</script>

</body>
