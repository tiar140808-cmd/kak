<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>surat cinta untuk dina</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Sacramento&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  height:100vh;
  font-family:'Poppins',sans-serif;
  background:
  radial-gradient(circle at top,#2d1b69,#0d1026 70%);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

/* =========================
   STARS
========================= */

.stars{
  position:fixed;
  inset:0;
  overflow:hidden;
}

.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  border-radius:50%;
  box-shadow:0 0 10px white;
  animation:twinkle linear infinite;
}

@keyframes twinkle{
  0%,100%{
    opacity:.2;
    transform:scale(.5);
  }

  50%{
    opacity:1;
    transform:scale(1.8);
  }
}

/* =========================
   FLOAT
========================= */

.container{
  position:relative;
  z-index:5;
  animation:float 4s ease-in-out infinite;
}

@keyframes float{
  0%,100%{
    transform:translateY(0);
  }

  50%{
    transform:translateY(-18px);
  }
}

/* =========================
   PANDA
========================= */

.panda{
  position:relative;
  width:280px;
  height:340px;
}

.head{
  position:absolute;
  width:220px;
  height:200px;
  background:white;
  border-radius:50%;
  left:30px;
  top:0;
}

.ear{
  position:absolute;
  width:70px;
  height:70px;
  background:#111;
  border-radius:50%;
  top:-20px;
}

.ear.left{ left:10px; }
.ear.right{ right:10px; }

.eyePatch{
  position:absolute;
  width:55px;
  height:75px;
  background:#111;
  border-radius:50%;
  top:65px;
}

.eyePatch.left{
  left:38px;
  transform:rotate(20deg);
}

.eyePatch.right{
  right:38px;
  transform:rotate(-20deg);
}

.eye{
  position:absolute;
  width:18px;
  height:18px;
  background:white;
  border-radius:50%;
  top:28px;
  left:18px;
  animation:blink 5s infinite;
}

@keyframes blink{
  0%,45%,100%{ height:18px; }
  50%{ height:2px; }
}

.nose{
  position:absolute;
  width:28px;
  height:20px;
  background:#111;
  border-radius:50%;
  top:120px;
  left:96px;
}

.mouth{
  position:absolute;
  width:40px;
  height:20px;
  border-bottom:3px solid #111;
  border-radius:0 0 40px 40px;
  top:138px;
  left:90px;
}

.body{
  position:absolute;
  width:190px;
  height:180px;
  background:white;
  border-radius:45%;
  left:45px;
  top:150px;
}

.arm{
  position:absolute;
  width:70px;
  height:120px;
  background:#111;
  border-radius:40px;
  top:170px;
}

.arm.left{
  left:5px;
  transform:rotate(25deg);
  animation:wave 2s infinite;
  transform-origin:top center;
}

.arm.right{
  right:5px;
  transform:rotate(-25deg);
}

@keyframes wave{
  0%,100%{ transform:rotate(25deg); }
  50%{ transform:rotate(45deg); }
}

.leg{
  position:absolute;
  width:70px;
  height:90px;
  background:#111;
  border-radius:40px;
  bottom:-10px;
}

.leg.left{ left:45px; }
.leg.right{ right:45px; }

/* =========================
   BUTTON
========================= */

.letter{
  position:absolute;
  top:205px;
  left:78px;
  width:125px;
  padding:14px;
  background:linear-gradient(135deg,#ff8dc7,#ff5ea8);
  color:white;
  border-radius:18px;
  text-align:center;
  font-weight:600;
  cursor:pointer;
  transition:.4s;
  box-shadow:0 10px 25px rgba(255,94,168,.4);
}

.letter:hover{
  transform:scale(1.08);
}

/* =========================
   PAPER
========================= */

.paper{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:1s;
  z-index:99;
  padding:20px;
}

.paper.show{
  opacity:1;
  pointer-events:auto;
}

.paperContent{
  width:90%;
  max-width:750px;
  height:80vh;
  background:linear-gradient(to bottom,#fffaf5,#ffeef5);
  border-radius:35px;
  overflow:hidden;
  position:relative;
  box-shadow:0 0 50px rgba(255,255,255,.15);
}

/* tombol lanjut ke buku.html */
#toBook{
  position:fixed;
  bottom:20px;
  width:100%;
  text-align:center;
  color:#ff9ecf;
  font-size:18px;
  font-weight:600;
  cursor:pointer;
  text-shadow:0 0 10px #ff4fd8;
  animation:pulse 1.5s infinite;
  z-index:100;
}

@keyframes pulse{
  50%{ transform:scale(1.1); }
}

/* fade keluar */
body.fadeOut{
  opacity:0;
  transform:scale(1.05);
  transition:1s ease;
}

</style>
</head>

<body>

<div class="stars"></div>

<div class="container">

  <div class="panda">

    <div class="head">
      <div class="ear left"></div>
      <div class="ear right"></div>

      <div class="eyePatch left">
        <div class="eye"></div>
      </div>

      <div class="eyePatch right">
        <div class="eye"></div>
      </div>

      <div class="nose"></div>
      <div class="mouth"></div>
    </div>

    <div class="body"></div>

    <div class="arm left"></div>
    <div class="arm right"></div>

    <div class="leg left"></div>
    <div class="leg right"></div>

    <div class="letter" onclick="openLetter()">
      💌 buka surat
    </div>

  </div>

</div>

<div class="paper" id="paper">
  <div class="paperContent">

    <button class="backBtn" onclick="closeLetter()">← kembali</button>
    <button class="close" onclick="closeLetter()">✕</button>

    <!-- isi kamu tetap sama (aku tidak ubah) -->

  </div>
</div>

<!-- 🔥 LINK KE BUKU.HTML -->
<div id="toBook">👉 MASUK DAN BACA DULU, ABIS ITU KLIK INI YAHHHHHH💖</div>

<script>

/* stars */
for(let i=0;i<170;i++){
  const star=document.createElement("div");
  star.className="star";
  star.style.left=Math.random()*100+"vw";
  star.style.top=Math.random()*100+"vh";
  star.style.animationDuration=(2+Math.random()*5)+"s";
  document.querySelector(".stars").appendChild(star);
}

/* surat */
function openLetter(){
  document.getElementById("paper").classList.add("show");
}

function closeLetter(){
  document.getElementById("paper").classList.remove("show");
}

/* 🔥 tombol ke buku.html */
document.getElementById("toBook").onclick=function(){

document.body.classList.add("fadeOut");

setTimeout(()=>{
window.location.href="buku.html";
},1000);

};

</script>

</body>
</html>
