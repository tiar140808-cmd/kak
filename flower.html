<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>flower</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:radial-gradient(circle at center,#101428,#050510);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:monospace;
  cursor:pointer;
}

/* BACKGROUND GLOW */
.glow{
  position:absolute;
  width:500px;
  height:500px;
  background:rgba(255,0,120,.08);
  border-radius:50%;
  filter:blur(100px);
  animation:pulse 5s ease-in-out infinite;
}

/* FLOWER */
.flower{
  position:relative;
  width:240px;
  height:430px;
  transform-origin:bottom center;
  animation:sway 4s ease-in-out infinite;
  transition:.8s;
}

/* STEM */
.stem{
  position:absolute;
  width:10px;
  height:250px;
  background:linear-gradient(#39ff88,#0a9448);
  left:115px;
  top:150px;
  border-radius:30px;
  box-shadow:0 0 10px rgba(0,255,120,.3);
}

/* PETALS */
.petal{
  position:absolute;
  width:95px;
  height:95px;
  background:linear-gradient(#ff84bd,#ff2f7d);
  border-radius:50%;
  box-shadow:0 0 20px rgba(255,80,140,.4);
  transition:1s;
}

.p1{top:35px;left:72px;}
.p2{top:75px;left:35px;}
.p3{top:75px;left:110px;}
.p4{top:118px;left:72px;}

/* CENTER */
.center{
  position:absolute;
  width:75px;
  height:75px;
  background:#ffd95c;
  border-radius:50%;
  top:92px;
  left:82px;
  z-index:2;
  box-shadow:0 0 20px rgba(255,217,92,.5);
  transition:1s;
}

/* LEAF HANDS */
.leaf{
  position:absolute;
  width:95px;
  height:45px;
  background:linear-gradient(#52ff95,#0ba357);
  border-radius:100px 0;
  top:235px;
}

.left{
  left:18px;
  transform:rotate(-35deg);
  animation:waveLeft 2.5s ease-in-out infinite;
  transform-origin:right center;
}

.right{
  right:18px;
  transform:scaleX(-1) rotate(-35deg);
  animation:waveRight 2.5s ease-in-out infinite;
  transform-origin:left center;
}

/* TEXT */
.text{
  position:absolute;
  bottom:55px;
  text-align:center;
  color:#ffd6e8;
  font-size:18px;
  text-shadow:0 0 12px rgba(255,255,255,.3);
  line-height:1.9;
  width:90%;
  opacity:.85;
  transition:1s;
}

/* CLICK EFFECT */
body.active .petal{
  background:linear-gradient(#ffb3d7,#ff4f98);
  box-shadow:
    0 0 25px rgba(255,120,180,.8),
    0 0 60px rgba(255,80,160,.6),
    0 0 120px rgba(255,50,140,.4);
  transform:scale(1.08);
}

body.active .center{
  box-shadow:
    0 0 30px rgba(255,230,120,.9),
    0 0 80px rgba(255,220,90,.7);
}

body.active .text{
  color:#fff0f6;
  text-shadow:
    0 0 10px rgba(255,255,255,.8),
    0 0 25px rgba(255,120,180,.5);
  opacity:1;
}

body.active .glow{
  background:rgba(255,70,150,.18);
}

/* ANIMATION */
@keyframes sway{
  0%{transform:rotate(-2deg);}
  50%{transform:rotate(2deg);}
  100%{transform:rotate(-2deg);}
}

@keyframes waveLeft{
  0%{transform:rotate(-35deg);}
  50%{transform:rotate(-12deg);}
  100%{transform:rotate(-35deg);}
}

@keyframes waveRight{
  0%{transform:scaleX(-1) rotate(-35deg);}
  50%{transform:scaleX(-1) rotate(-12deg);}
  100%{transform:scaleX(-1) rotate(-35deg);}
}

@keyframes pulse{
  0%{
    transform:scale(1);
    opacity:.5;
  }
  50%{
    transform:scale(1.15);
    opacity:.9;
  }
  100%{
    transform:scale(1);
    opacity:.5;
  }
}
</style>
</head>

<body onclick="shineFlower()">

<div class="glow"></div>

<div class="flower">

  <div class="petal p1"></div>
  <div class="petal p2"></div>
  <div class="petal p3"></div>
  <div class="petal p4"></div>

  <div class="center"></div>

  <div class="stem"></div>

  <div class="leaf left"></div>
  <div class="leaf right"></div>

</div>

<div class="text">
  aku cuma bunga kecil yang ga bisa kamu miliki...<br>
  tapi diam-diam selalu mekar tiap kali liat kamu bahagia 🌸
</div>

<script>
function shineFlower(){
  document.body.classList.toggle("active");
}
</script>

</body>
</html>
