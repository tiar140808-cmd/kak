<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>flower</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:radial-gradient(circle at center,#101428,#050510);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:monospace;
  cursor:pointer;
  transition:1.2s;
}

/* FLASH */
.flash{
  position:fixed;
  inset:0;
  background:white;
  opacity:0;
  pointer-events:none;
  transition:1.2s;
  z-index:50;
}

/* GLOW */
.glow{
  position:absolute;
  width:500px;
  height:500px;
  background:rgba(255,0,120,.08);
  border-radius:50%;
  filter:blur(100px);
  animation:pulse 5s ease-in-out infinite;
  transition:1.5s;
}

/* FLOWER */
.flower{
  position:relative;
  width:240px;
  height:430px;
  transform-origin:bottom center;
  animation:sway 4s ease-in-out infinite;
  transition:1.2s;
  z-index:2;
}

/* STEM */
.stem{
  position:absolute;
  width:10px;
  height:250px;
  background:linear-gradient(#39ff88,#0a9448);
  left:115px;
  top:150px;
  border-radius:30px;
  box-shadow:0 0 10px rgba(0,255,120,.3);
  transition:1s;
}

/* PETALS */
.petal{
  position:absolute;
  width:95px;
  height:95px;
  background:linear-gradient(#ff84bd,#ff2f7d);
  border-radius:50%;
  box-shadow:0 0 20px rgba(255,80,140,.4);
  transition:1.2s;
}

.p1{top:35px;left:72px;}
.p2{top:75px;left:35px;}
.p3{top:75px;left:110px;}
.p4{top:118px;left:72px;}

/* CENTER */
.center{
  position:absolute;
  width:75px;
  height:75px;
  background:#ffd95c;
  border-radius:50%;
  top:92px;
  left:82px;
  z-index:2;
  box-shadow:0 0 20px rgba(255,217,92,.5);
  transition:1s;
}

/* LEAF */
.leaf{
  position:absolute;
  width:95px;
  height:45px;
  background:linear-gradient(#52ff95,#0ba357);
  border-radius:100px 0;
  top:235px;
  transition:1s;
}

.left{
  left:18px;
  transform:rotate(-35deg);
  animation:waveLeft 2.5s ease-in-out infinite;
  transform-origin:right center;
}

.right{
  right:18px;
  transform:scaleX(-1) rotate(-35deg);
  animation:waveRight 2.5s ease-in-out infinite;
  transform-origin:left center;
}

/* TEXT */
.text{
  position:absolute;
  bottom:55px;
  text-align:center;
  color:#ffd6e8;
  font-size:18px;
  text-shadow:0 0 12px rgba(255,255,255,.3);
  line-height:1.9;
  width:90%;
  opacity:.9;
  transition:1s;
  z-index:2;
}

/* TAP TEXT */
.tap{
  position:absolute;
  top:40px;
  color:#ffffffaa;
  font-size:14px;
  letter-spacing:2px;
  animation:blink 1.8s infinite;
  z-index:5;
}

/* ACTIVE MODE */
body.active{
  background:radial-gradient(circle at center,#ffd8ec,#ff5fa8,#ff3b8d);
}

body.active .flash{
  opacity:.4;
}

body.active .petal{
  background:linear-gradient(#ffd6ea,#ff5fa8);
  box-shadow:0 0 100px rgba(255,120,180,.9);
  transform:scale(1.08);
}

body.active .center{
  background:#fff4af;
  box-shadow:0 0 100px rgba(255,230,120,.9);
}

body.active .glow{
  background:rgba(255,180,220,.4);
  transform:scale(1.5);
}

body.active .text{
  color:white;
}

/* FALLING PETALS */
.petals{
  position:fixed;
  inset:0;
  overflow:hidden;
  pointer-events:none;
  z-index:1;
}

.petal-fall{
  position:absolute;
  top:-50px;
  font-size:20px;
  animation:fall linear forwards;
}

@keyframes fall{
  0%{transform:translateY(-50px);opacity:0;}
  10%{opacity:1;}
  100%{transform:translateY(110vh) rotate(360deg);opacity:0;}
}

/* LIGHT DUST */
.dust{
  position:fixed;
  inset:0;
  overflow:hidden;
  pointer-events:none;
  z-index:0;
}

.dot{
  position:absolute;
  width:3px;
  height:3px;
  background:white;
  border-radius:50%;
  opacity:.3;
  animation:float 8s linear infinite;
}

@keyframes float{
  0%{transform:translateY(100vh);opacity:0;}
  20%{opacity:.6;}
  100%{transform:translateY(-10vh);opacity:0;}
}

/* MESSAGE */
.msgBox{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(.8);
  padding:20px 25px;
  background:rgba(0,0,0,.6);
  color:white;
  font-size:16px;
  text-align:center;
  border-radius:12px;
  opacity:0;
  transition:1.2s;
  z-index:999;
}

/* ANIMATION */
@keyframes sway{
  0%{transform:rotate(-2deg);}
  50%{transform:rotate(2deg);}
  100%{transform:rotate(-2deg);}
}

@keyframes waveLeft{
  0%{transform:rotate(-35deg);}
  50%{transform:rotate(-12deg);}
  100%{transform:rotate(-35deg);}
}

@keyframes waveRight{
  0%{transform:scaleX(-1) rotate(-35deg);}
  50%{transform:scaleX(-1) rotate(-12deg);}
  100%{transform:scaleX(-1) rotate(-35deg);}
}

@keyframes pulse{
  0%{transform:scale(1);opacity:.5;}
  50%{transform:scale(1.15);opacity:.9;}
  100%{transform:scale(1);opacity:.5;}
}

@keyframes blink{
  0%,100%{opacity:.3;}
  50%{opacity:1;}
}
</style>
</head>

<body onclick="shineFlower()">

<div class="flash"></div>
<div class="tap">klik dong mawarnya 🌸</div>

<div class="glow"></div>

<div class="flower">
  <div class="petal p1"></div>
  <div class="petal p2"></div>
  <div class="petal p3"></div>
  <div class="petal p4"></div>

  <div class="center"></div>

  <div class="stem"></div>

  <div class="leaf left"></div>
  <div class="leaf right"></div>
</div>

<div class="text">
  aku cuma bunga kecil yang ga bisa kamu miliki...<br>
  tapi diam-diam selalu mekar tiap kali liat kamu bahagia 🌸
</div>

<div class="petals"></div>
<div class="dust"></div>

<script>
let timeout;
let clickCount = 0;

const messages = [
  "jangan terlalu capek ya... kamu udah hebat 🌸",
  "aku bangga sama kamu, serius.",
  "kalau dunia jahat, aku tetap di sini.",
  "kamu itu berharga, jangan lupa itu.",
  "pelan-pelan aja, kamu nggak sendiri."
];

/* DUST */
function createDust(){
  const dust = document.querySelector(".dust");
  for(let i=0;i<40;i++){
    const d=document.createElement("div");
    d.className="dot";
    d.style.left=Math.random()*100+"vw";
    d.style.animationDuration=(4+Math.random()*6)+"s";
    dust.appendChild(d);
  }
}
createDust();

/* CLICK */
function shineFlower(){

  document.body.classList.add("active");

  if(navigator.vibrate){
    navigator.vibrate([100,50,100]);
  }

  createPetals();

  clickCount++;

  if(clickCount===3){
    showMessage();
    clickCount=0;
  }

  clearTimeout(timeout);

  timeout=setTimeout(()=>{
    document.body.classList.remove("active");
  },2500);
}

/* PETALS */
function createPetals(){
  for(let i=0;i<10;i++){
    const p=document.createElement("div");
    p.className="petal-fall";
    p.innerHTML="🌸";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(3+Math.random()*3)+"s";
    document.querySelector(".petals").appendChild(p);

    setTimeout(()=>p.remove(),6000);
  }
}

/* MESSAGE */
function showMessage(){

  const msg=document.createElement("div");
  msg.className="msgBox";
  msg.innerText=messages[Math.floor(Math.random()*messages.length)];

  document.body.appendChild(msg);

  setTimeout(()=>{
    msg.style.opacity="1";
    msg.style.transform="translate(-50%,-50%) scale(1)";
  },100);

  setTimeout(()=>{
    msg.style.opacity="0";
    msg.style.transform="translate(-50%,-50%) scale(.8)";
    setTimeout(()=>msg.remove(),1000);
  },3500);
}
</script>

</body>
</html>
